<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Histórico</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Histórico</h1>

        <div id="lista"></div>

        <button onclick="voltar()">Voltar</button>

    </div>

    <script src="js/api.js"></script>

    <script>

        const API = "http://localhost:3000"

        async function carregar() {

            const data = await apiFetch(API + "/sorteio/historico")

            const div = document.getElementById("lista")

            div.innerHTML = ""

            data.dados.forEach(s => {

                div.innerHTML += `
        <p>
        Sorteio #${s.id}
        <button onclick="abrir(${s.id})">Abrir</button>
        <button onclick="pdf(${s.id})">PDF</button>
        </p>
        `
            })
        }

        async function abrir(id) {

            const data = await apiFetch(API + "/sorteio/abrir/" + id)

            console.log(JSON.parse(data.resultado))
        }

        function pdf(id) {
            window.open(API + "/sorteio/pdf/" + id)
        }

        function voltar() {
            window.location.href = "admin.html"
        }

        carregar()

    </script>

</body>

</html>

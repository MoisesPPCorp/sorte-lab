<script src="js/api.js"></script>

<script>

    async function carregar() {

        const data = await apiFetch("/sorteio/historico")

        const div = document.getElementById("lista")
        div.innerHTML = ""

            (data.dados || []).forEach(s => {

                div.innerHTML += `
        <p>
        Sorteio #${s.id}
        <button onclick="abrir(${s.id})">Abrir</button>
        <button onclick="pdf(${s.id})">PDF</button>
        </p>
        `
            })
    }

    async function abrir(id) {
        const data = await apiFetch("/sorteio/abrir/" + id)
        console.log(JSON.parse(data.resultado))
    }

    function pdf(id) {
        window.open("https://sorte-lab-production.up.railway.app/sorteio/pdf/" + id)
    }

    function voltar() {
        window.location.href = "admin.html"
    }

    carregar()

</script>

<script src="js/api.js"></script>

<script>

    async function sortear() {

        const qtd = document.getElementById("qtd").value
        const div = document.getElementById("resultado")

        if (!qtd) {
            alert("Informe jogadores por grupo")
            return
        }

        div.innerHTML = `<div>🎲 Embaralhando...</div>`

        const data = await apiFetch("/sorteio/sortear", {
            method: "POST",
            body: JSON.stringify({
                jogadoresPorGrupo: qtd
            })
        })

        if (data.erro) {
            div.innerHTML = ""
            alert(data.erro)
            return
        }

        div.innerHTML = `<div class="grupos"></div>`
        const gruposDiv = div.querySelector(".grupos")

        data.grupos.forEach(g => {

            gruposDiv.innerHTML += `
        <div class="grupo">
            <h3>Grupo ${g.grupo}</h3>

            ${g.especial ? `
                <div class="jogador especial">
                    ⭐ ${g.especial.nome}
                </div>
            ` : ""}

            ${g.jogadores.map(j => `
                <div class="jogador n${j.nivel}">
                    ${j.nome} (N${j.nivel})
                </div>
            `).join("")}

        </div>
        `
        })
    }

    function voltar() {
        window.location.href = "admin.html"
    }

</script>

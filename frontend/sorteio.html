<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SorteLab - Sorteio</title>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>SorteLab</h1>
        <h2>Sorteio de Times</h2>

        <hr>

        <h3>Adicionar participantes</h3>

        <input id="participante" placeholder="Nome, apelido ou ID">

        <button onclick="adicionar()">Adicionar</button>
        <button onclick="limpar()">Limpar Lista</button>

        <div id="listaSelecionados"></div>

        <hr>

        <button onclick="sortear()">Sortear Times</button>

        <hr>

        <div class="grupos">

            <div class="grupo">
                <h3>Grupo A</h3>
                <div id="grupoA" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo B</h3>
                <div id="grupoB" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo C</h3>
                <div id="grupoC" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo D</h3>
                <div id="grupoD" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

        </div>

        <br>

        <button onclick="novoSorteio()">Novo Sorteio</button>
        <button onclick="voltar()">Voltar</button>

    </div>

    <script src="js/api.js"></script>

    <script>

        const API = "http://localhost:3000"

        let participantes = []

        // 🔍 BUSCAR E ADICIONAR
        async function adicionar() {

            const termo = document.getElementById("participante").value

            if (!termo) return

            const data = await apiFetch(API + "/usuarios/buscar/" + termo)

            if (!data.dados || data.dados.length === 0) {
                alert("Participante não encontrado")
                return
            }

            participantes.push(data.dados[0])

            atualizarLista()

            document.getElementById("participante").value = ""
        }

        // 🧾 LISTA LOCAL
        function atualizarLista() {

            const lista = document.getElementById("listaSelecionados")

            lista.innerHTML = ""

            participantes.forEach(p => {
                lista.innerHTML += `<p>${p.nome} (${p.apelido}) ⭐${p.nivel}</p>`
            })
        }

        // 🧹 LIMPAR
        function limpar() {
            participantes = []
            atualizarLista()
        }

        // 🎲 SORTEAR
        async function sortear() {

            const res = await apiFetch(API + "/sorteio/sortear", {
                method: "POST",
                body: JSON.stringify({
                    jogadoresPorGrupo: 5
                })
            })

            if (!res.grupos) {
                alert(res.erro || "Erro no sorteio")
                return
            }

            // LIMPAR GRUPOS
            ["A", "B", "C", "D"].forEach(g => {
                const el = document.getElementById("grupo" + g)
                if (el) el.innerHTML = ""
            })

            res.grupos.forEach(g => {

                const div = document.getElementById("grupo" + g.grupo)

                if (!div) return

                if (g.especial) {
                    div.innerHTML += `<p>⭐ ${g.especial.nome}</p>`
                }

                g.jogadores.forEach(j => {
                    div.innerHTML += `
            <div class="jogador">
                ${j.nome} (N${j.nivel})
            </div>
            `
                })
            })
        }

        // 🔁 NOVO SORTEIO
        function novoSorteio() {
            if (confirm("Novo sorteio?")) {
                location.reload()
            }
        }

        // 🔙 VOLTAR
        function voltar() {
            window.location.href = "admin.html"
        }

    </script>

</body>

</html>

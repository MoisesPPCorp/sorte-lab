<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SorteLab - Sorteio</title>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>SorteLab</h1>
        <h2>Sorteio de Times</h2>

        <hr>

        <h3>Adicionar participantes</h3>

        <input id="participante" placeholder="Nome, apelido ou ID">

        <button onclick="adicionar()">Adicionar</button>
        <button onclick="limpar()">Limpar Lista</button>

        <div id="listaSelecionados"></div>

        <hr>

        <button onclick="sortear()">Sortear Times</button>

        <hr>

        <div class="grupos">

            <div class="grupo">
                <h3>Grupo A</h3>
                <div id="grupoA" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo B</h3>
                <div id="grupoB" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo C</h3>
                <div id="grupoC" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

            <div class="grupo">
                <h3>Grupo D</h3>
                <div id="grupoD" ondrop="soltar(event)" ondragover="permitirSoltar(event)"></div>
            </div>

        </div>

        <br>

        <button onclick="novoSorteio()">Novo Sorteio</button>
        <button onclick="voltar()">Voltar</button>

    </div>

    <script>

        const API = "http://localhost:3000"

        let participantes = []

        async function adicionar() {

            const termo = document.getElementById("participante").value

            if (termo == "") return

            const time_id = localStorage.getItem("time_id")

            const res = await fetch(API + "/usuarios/buscar/" + time_id + "/" + termo)

            const jogadores = await res.json()

            if (jogadores.length == 0) {

                alert("Participante não encontrado")
                return

            }

            participantes.push(jogadores[0])

            atualizarLista()

            document.getElementById("participante").value = ""

        }

        function atualizarLista() {

            const lista = document.getElementById("listaSelecionados")

            lista.innerHTML = ""

            participantes.forEach(p => {

                lista.innerHTML += `
<p>${p.nome} (${p.apelido}) ⭐${p.nivel}</p>
`

            })

        }

        function limpar() {

            participantes = []
            atualizarLista()

        }

        async function sortear() {

            const time_id = localStorage.getItem("time_id")

            const res = await fetch(API + "/sorteio/sortear/" + time_id, {
                method: "POST"
            })

            const grupos = await res.json()

            document.getElementById("grupoA").innerHTML = ""
            document.getElementById("grupoB").innerHTML = ""
            document.getElementById("grupoC").innerHTML = ""
            document.getElementById("grupoD").innerHTML = ""

            grupos.forEach(g => {

                const div = document.getElementById("grupo" + g.grupo)

                g.linha.forEach(j => {

                    div.innerHTML += `
<div class="jogador"
draggable="true"
ondragstart="arrastar(event)"
id="jogador-${j.id}">
${j.nome}
</div>
`

                })

                if (g.goleiro) {

                    div.innerHTML += `
<div class="jogador goleiro">
🥅 ${g.goleiro.nome}
</div>
`

                }

            })

        }

        function novoSorteio() {

            if (confirm("Deseja realizar novo sorteio?")) {

                location.reload()

            }

        }

        function voltar() {

            window.location.href = "admin.html"

        }

        function permitirSoltar(ev) {

            ev.preventDefault()

        }

        function arrastar(ev) {

            ev.dataTransfer.setData("text", ev.target.id)

        }

        function soltar(ev) {

            ev.preventDefault()

            const data = ev.dataTransfer.getData("text")

            const jogador = document.getElementById(data)

            ev.target.appendChild(jogador)

        }

    </script>

</body>

</html>

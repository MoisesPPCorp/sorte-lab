<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>SorteLab</h1>

        <input id="nome" placeholder="Nome">
        <input id="apelido" placeholder="Apelido">
        <input id="nivel" placeholder="Nível (1,2,3)">

        <button onclick="cadastrar()">Cadastrar</button>

        <hr>

        <button onclick="carregar()">Atualizar Lista</button>

        <div id="listaParticipantes"></div>

        <hr>

        <button onclick="irSorteio()">Sorteio</button>
        <button onclick="irHistorico()">Histórico</button>
        <button onclick="sair()">Sair</button>

    </div>

    <script src="js/api.js"></script>

    <script>

        const API = "http://localhost:3000"

        function sair() {
            localStorage.removeItem("token")
            window.location.href = "login.html"
        }

        function irSorteio() {
            window.location.href = "sorteio.html"
        }

        function irHistorico() {
            window.location.href = "historico.html"
        }

        async function cadastrar() {

            const nome = document.getElementById("nome").value
            const apelido = document.getElementById("apelido").value
            const nivel = document.getElementById("nivel").value

            const data = await apiFetch(API + "/usuarios/cadastrar", {
                method: "POST",
                body: JSON.stringify({
                    nome,
                    apelido,
                    nivel
                })
            })

            alert(data.mensagem || data.erro)
            carregar()
        }

        async function carregar() {

            const data = await apiFetch(API + "/usuarios/listar")

            const lista = document.getElementById("listaParticipantes")
            lista.innerHTML = ""

            data.dados.forEach(j => {

                lista.innerHTML += `
        <p>
        ${j.nome} (${j.apelido}) ⭐${j.nivel}
        <button onclick="remover(${j.id})">Remover</button>
        </p>
        `
            })
        }

        async function remover(id) {

            await apiFetch(API + "/usuarios/remover/" + id, {
                method: "DELETE"
            })

            carregar()
        }

        carregar()

    </script>

</body>

</html>
